name: Setup UiPath CLI
description: Installs UiPath.CLI.Windows as a .NET tool and adds uipcli.exe to PATH

inputs:
  version:
    description: NuGet version of UiPath.CLI.Windows (e.g. 25.10.20)
    required: true
  cache-key-prefix:
    description: Prefix for the cache key
    required: false
    default: uipcli

runs:
  using: composite
  steps:
    - name: Cache UiPath CLI
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ runner.tool_cache }}/uipcli/${{ inputs.version }}
        key: ${{ inputs.cache-key-prefix }}-windows-${{ inputs.version }}

    - name: Install UiPath CLI via dotnet tool
      if: steps.cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $toolPath = "$env:RUNNER_TOOL_CACHE\uipcli\${{ inputs.version }}"
        New-Item -ItemType Directory -Path $toolPath -Force | Out-Null

        Write-Host "Installing UiPath.CLI.Windows ${{ inputs.version }} as a .NET tool..."
        dotnet tool install UiPath.CLI.Windows `
          --version "${{ inputs.version }}" `
          --tool-path "$toolPath"

        if ($LASTEXITCODE -ne 0) {
          Write-Error "dotnet tool install failed (exit $LASTEXITCODE)"
          exit 1
        }

        $cli = Get-ChildItem -Path $toolPath -Filter "uipcli.exe" | Select-Object -First 1
        if (-not $cli) {
          Write-Error "uipcli.exe not found in $toolPath after install. Contents:"
          Get-ChildItem $toolPath | Select-Object -ExpandProperty Name
          exit 1
        }
        Write-Host "Installed: $($cli.FullName)"

    - name: Add UiPath CLI to PATH
      shell: pwsh
      run: |
        $toolPath = "$env:RUNNER_TOOL_CACHE\uipcli\${{ inputs.version }}"
        $toolPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        Write-Host "Added to PATH: $toolPath"

    - name: Verify CLI
      shell: pwsh
      run: |
        $ver = & uipcli.exe --version 2>&1
        if ($LASTEXITCODE -ne 0) {
          Write-Error "uipcli.exe not usable (exit $LASTEXITCODE): $ver"
          exit 1
        }
        Write-Host "uipcli version: $ver"
