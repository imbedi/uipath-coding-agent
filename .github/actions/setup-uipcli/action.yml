name: Setup UiPath CLI
description: Downloads and caches UiPath.CLI.Windows from NuGet and adds uipcli.exe to PATH

inputs:
  version:
    description: NuGet version of UiPath.CLI.Windows (e.g. 25.10.20)
    required: true
  cache-key-prefix:
    description: Prefix for the cache key
    required: false
    default: uipcli

runs:
  using: composite
  steps:
    - name: Cache UiPath CLI
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ runner.tool_cache }}/uipcli/${{ inputs.version }}
        key: ${{ inputs.cache-key-prefix }}-windows-${{ inputs.version }}

    - name: Download UiPath CLI via NuGet
      if: steps.cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $pkgRoot = "$env:RUNNER_TOOL_CACHE\uipcli\${{ inputs.version }}"
        New-Item -ItemType Directory -Path $pkgRoot -Force | Out-Null

        Write-Host "Downloading UiPath.CLI.Windows ${{ inputs.version }} from NuGet..."
        nuget install UiPath.CLI.Windows `
          -Version "${{ inputs.version }}" `
          -OutputDirectory "$pkgRoot" `
          -NonInteractive `
          -Source "https://api.nuget.org/v3/index.json"

        if ($LASTEXITCODE -ne 0) {
          Write-Error "nuget install failed (exit $LASTEXITCODE)"
          exit 1
        }

        # Locate uipcli.exe inside the extracted package tree
        $cli = Get-ChildItem -Path $pkgRoot -Recurse -Filter "uipcli.exe" | Select-Object -First 1
        if (-not $cli) {
          Write-Error "uipcli.exe not found in extracted package. Available files:"
          Get-ChildItem $pkgRoot -Recurse | Select-Object -ExpandProperty FullName
          exit 1
        }

        # Persist the bin directory path so the PATH step can read it from cache
        $cli.DirectoryName | Out-File -FilePath "$pkgRoot\.binpath" -Encoding utf8
        Write-Host "uipcli.exe found at: $($cli.FullName)"

    - name: Add UiPath CLI to PATH
      shell: pwsh
      run: |
        $pkgRoot  = "$env:RUNNER_TOOL_CACHE\uipcli\${{ inputs.version }}"
        $binPath  = "$pkgRoot\.binpath"

        if (Test-Path $binPath) {
          $binDir = (Get-Content $binPath -Raw).Trim()
        } else {
          # Fallback: search again (handles cache-hit path where .binpath already exists)
          $cli    = Get-ChildItem -Path $pkgRoot -Recurse -Filter "uipcli.exe" | Select-Object -First 1
          if (-not $cli) {
            Write-Error "Cannot locate uipcli.exe in $pkgRoot"
            exit 1
          }
          $binDir = $cli.DirectoryName
        }

        $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        Write-Host "Added to PATH: $binDir"

    - name: Verify CLI
      shell: pwsh
      run: |
        $ver = & uipcli.exe --version 2>&1
        if ($LASTEXITCODE -ne 0) {
          Write-Error "uipcli.exe not usable (exit $LASTEXITCODE): $ver"
          exit 1
        }
        Write-Host "uipcli version: $ver"
